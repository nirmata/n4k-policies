# ClusterRole and ClusterRoleBinding for Kyverno background reporting on
# pods/ephemeralcontainers (required by policies like restrict-image-registries).
# Bound to kyverno-reports-controller SA (the component that performs policy reporting).
# Apply with: kubectl apply -f helm/kyverno-reporting-rbac.yaml
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-reporting-pods-ephemeralcontainers
  labels:
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: [""]
    resources: ["pods/ephemeralcontainers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno-reporting-pods-ephemeralcontainers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno-reporting-pods-ephemeralcontainers
subjects:
  - kind: ServiceAccount
    name: kyverno-reports-controller
    namespace: kyverno
---
# ClusterRole for check-deprecated-apis policy reporting (get/list/watch on all
# resource types that policy matches). Bound to kyverno-reports-controller SA.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-reporting-check-deprecated-apis
  labels:
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: ["policy"]
    resources: ["podsecuritypolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["node.k8s.io"]
    resources: ["runtimeclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["flowcontrol.apiserver.k8s.io"]
    resources: ["flowschemas", "prioritylevelconfigurations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["csistoragecapacities"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno-reporting-check-deprecated-apis
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno-reporting-check-deprecated-apis
subjects:
  - kind: ServiceAccount
    name: kyverno-reports-controller
    namespace: kyverno
