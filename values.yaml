# n4k-policies — optional Kyverno ValidatingPolicy sets.
# Nothing is installed unless a set has enabled: true (opt-in per set).

# Pod Security Standards (Baseline + Restricted) — policies in pod-security/*.yaml
podSecurity:
  enabled: false
  excluded: []
  overrides: {}

# Best practices — policies in best-practices/*.yaml
bestPractices:
  enabled: false
  excluded: []
  overrides: {}

# Cleanup policies — add ValidatingPolicy YAML files under cleanup-policies/
cleanupPolicies:
  enabled: false
  excluded: []
  overrides: {}

# Platform engineering policies — add ValidatingPolicy YAML files under platform-engineering/
platformEngineering:
  enabled: false
  excluded: []
  overrides: {}

# ClusterRoles that aggregate to Kyverno reports-controller (label
# rbac.kyverno.io/aggregate-to-reports-controller). Needed for reporting on some
# best-practices policies (e.g. check-deprecated-apis). Enable when you use those policies.
reportingRBAC:
  enabled: false
