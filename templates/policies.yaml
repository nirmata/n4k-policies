{{- /*
  Renders Kyverno ValidatingPolicies from optional policy sets (directories of *.yaml).
  Each set is deployed only when values.<setKey>.enabled is true.
*/ -}}
{{- $root := . }}
{{ include "n4k-policies.renderPolicySet" (dict "root" $root "set" .Values.podSecurity "glob" "pod-security/*.yaml") }}
{{ include "n4k-policies.renderPolicySet" (dict "root" $root "set" .Values.bestPractices "glob" "best-practices/*.yaml") }}
{{ include "n4k-policies.renderPolicySet" (dict "root" $root "set" .Values.cleanupPolicies "glob" "cleanup-policies/*.yaml") }}
{{ include "n4k-policies.renderPolicySet" (dict "root" $root "set" .Values.platformEngineering "glob" "platform-engineering/*.yaml") }}
